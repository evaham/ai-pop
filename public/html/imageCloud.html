<html xmlns="http://www.w3.org/1999/xhtml">

<head>
  <title>

  </title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <link href="./weblink_common.css" rel="stylesheet" type="text/css">
  <link href="./style.css" rel="stylesheet" type="text/css">
  <style>
    .search__btn--line {margin-top: 7px;width: 15px;height: 15px;background: url(../resources/img/ico_close.png) center center no-repeat;cursor: pointer;}
    .sidebar__logo{margin: 8.5px 0px; border-bottom:none;}
    .header{padding-top: 26px;}
    .nav__list{border-top:1px solid #dee2e6;}
    .contents{margin-top: 10px;}
    .item__txtbox{height:50%;}
    .optionbar__btn{padding:3px 5px; font-size:12px;}
    .optionbar__btn.active{background: #228be6;color:#fff; border:1px solid #228be6;}
  </style>
</head>

<body>
  <div id="app">
    <div class="wrap">
      <div class="sidebar">
        <a href=""
          class="sidebar__logo">
          <img src="./img/img_imagecloud.png">
        </a>
        <ul class="nav__list">
          <li>
            <a href="" class="nav__link">상품이미지</a>
            <ul class="nav__sublist">
              <li>
                <a class="nav__sublink" href="">상품이미지</a>
              </li>
            </ul>
          </li>
          <li>
            <a href="" class="nav__link">효과이미지</a>
            <ul class="nav__sublist">
              <li class="">
                <a class="nav__sublink" href="">타이틀배너</a>
              </li>
              <li class="">
                <a class="nav__sublink" href="">코너배너</a>
              </li>
              <li class="">
                <a class="nav__sublink" href="">행사뱃지</a>
              </li>
            </ul>
          </li>
          <li class="">
            <a href="" class="nav__link">내이미지</a>
            <ul class="nav__sublist">
              <li class="">
                <a class="nav__sublink" href="">이미지허브</a>
              </li>
              <li>
                <a class="nav__sublink" href="">매장사진</a>
              </li>
            </ul>
          </li>
          <li class="active">
            <a href="" class="nav__link">AI POP</a>
            <ul class="nav__sublist">
              <li class="active">
                <a class="nav__sublink" href="">AI POP</a>
              </li>
              <li>
                <a class="nav__sublink"href="">AI 이미지 관리</a>
              </li>
              <li>
                <a class="nav__sublink" href="">AI 이미지 관리</a>
              </li>
              <li>
                <a class="nav__sublink" href="">AI 이용현황</a>
              </li>
            </ul>
          </li>
        </ul>
      </div>
      <div class="container">
        <div class="header" style="height: 67px;">
          <div class="titbox">
            <p class="titbox__tit">AI POP 생성</p>
          </div>
        </div>
        <div class="contents">
          <div class="scrollwrap">
            <div style="flex: 1; display: flex; flex-direction: column; padding: 0 10px 10px">
              <iframe id="frmForm" name="frmForm" width="100%" height="100%" frameborder="0" scrolling="no" 
                src="https://evaham.github.io/ai-pop/"
                style="flex: 1; overflow: hidden; position: relative; max-width: 800px; height: 100%; border-radius: 20px;"
              ></iframe>
            </div>
          </div>
          <div class="pagination">
            <div class="pagination__list maxviewsize"></div>
          </div>

        </div>
      </div>
    </div>
    <div class="layer layer__wrap clip" style="display:none;">
      <div class="layer__bg"></div>
      <div class="layer__box">
        <div class="layer__imgbox clip" contenteditable="true" id="layerClip"></div>
        <a href="javascript:void(0)" class="layer__close" onclick="jsHideClipView()">
          <span class="icon-close"></span>
        </a>
        <a href="javascript:void(0)" class="layer__btn" onclick="jsSaveClipView()">저장</a>
      </div>
    </div>
  </div>
</body>
</html>
